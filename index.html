<script>
// ========== NYSHIP CONFIG ==========
const NYSHIP_CONFIG = {
  weights: {
    csat: 0.15,
    qa: 0.30,
    adherence: 0.08,
    aht: 0.10,
    attendance: 0.13,
    opened: 0.07,
    nrsc: 0.07,
    pkt: 0.10
  },
  goals: {
    csat: 94.30,
    qa: 94.00,
    adherence: 94.10,
    aht: 600,
    attendance: 98,
    opened: 95,
    nrsc: 3,
    pkt: 90
  },
  qaMinDisqualify: 94.00,
  tiers: {
    platinum: 95,
    golden: 90,
    bronze: 80
  }
};

// ========== NYSHIP PARSER FUNCTION ==========
function loadNYSHIPData(file) {
  return new Promise((resolve, reject) => {
    const reader = new FileReader();
    reader.onload = function(e) {
      try {
        const data = new Uint8Array(e.target.result);
        const workbook = XLSX.read(data, { type: 'array' });
        
        // Prioridad: EXPORT NYSHIP → mes actual → IMPORT NYSHIP
        let worksheet = workbook.Sheets['EXPORT NYSHIP'];
        if (!worksheet) {
          const currentMonth = new Date().toLocaleString('es-ES', { month: 'long' });
          worksheet = workbook.Sheets[currentMonth.charAt(0).toUpperCase() + currentMonth.slice(1)];
        }
        if (!worksheet) {
          worksheet = workbook.Sheets['IMPORT NYSHIP'];
        }
        if (!worksheet) {
          throw new Error('No se encontró tab EXPORT NYSHIP, mes actual, o IMPORT NYSHIP');
        }
        
        const rows = XLSX.utils.sheet_to_json(worksheet);
        const nyshipData = {};
        let smeCount = 0;
        
        rows.forEach(row => {
          const associateId = String(row['AssociateID'] || '').trim();
          if (!associateId) return;
          
          const name = String(row['Advocate Name'] || '').trim();
          const teamLead = String(row['Team Lead'] || '').trim();
          const lob = String(row['LOB'] || 'NYSHIP').trim();
          const location = String(row['Location'] || 'Tampa, FL').trim();
          
          // Excluir Susan Singleton del count regular
          if (name === 'Susan Singleton') {
            smeCount++;
            return;
          }
          
          const csat = parseFloat(row['CSAT']) || 0;
          const qa = parseFloat(row['QA']) || 0;
          const adherence = parseFloat(row['Adherence']) || 0;
          const aht = parseFloat(row['AHT']) || 0;
          const attendance = parseFloat(row['Attendance']) || 0;
          const opened = parseFloat(row['Opened within month-2 days'] || row['Opened']) || 0;
          const nrsc = parseFloat(row['NR+SC']) || 0;
          const pkt = parseFloat(row['PKT']) || 0;
          
          // Validar QA mínimo descalificante
          if (qa < NYSHIP_CONFIG.qaMinDisqualify) {
            nyshipData[associateId] = { disqualified: true, reason: 'QA below minimum' };
            return;
          }
          
          // Calcular Final Score con pesos - AHT capado al 100%
          const ahtScore = Math.min(1, NYSHIP_CONFIG.goals.aht / aht);
          const finalScore = (
            (csat / 100) * NYSHIP_CONFIG.weights.csat +
            (qa / 100) * NYSHIP_CONFIG.weights.qa +
            (adherence / 100) * NYSHIP_CONFIG.weights.adherence +
            ahtScore * NYSHIP_CONFIG.weights.aht +
            (attendance / 100) * NYSHIP_CONFIG.weights.attendance +
            (opened / 100) * NYSHIP_CONFIG.weights.opened +
            ((100 - nrsc) / 100) * NYSHIP_CONFIG.weights.nrsc +
            (pkt / 100) * NYSHIP_CONFIG.weights.pkt
          ) * 100;
          
          // Determinar Tier
          let tier = 'Standard';
          let tierIcon = '⭕';
          if (finalScore >= NYSHIP_CONFIG.tiers.platinum) {
            tier = 'Platinum';
            tierIcon = '💜';
          } else if (finalScore >= NYSHIP_CONFIG.tiers.golden) {
            tier = 'Golden';
            tierIcon = '🥇';
          } else if (finalScore >= NYSHIP_CONFIG.tiers.bronze) {
            tier = 'Bronze';
            tierIcon = '🥉';
          }
          
          nyshipData[associateId] = {
            name,
            firstName: name.split(' ')[0],
            team: 'Team Tami',
            lob: 'NYSHIP',
            location,
            month: row['Score Month'] || new Date().toLocaleString('es-ES', { month: 'long', year: 'numeric' }),
            finalScore: Math.round(finalScore * 100) / 100,
            tier,
            tierIcon,
            csat,
            qa,
            adherence,
            aht,
            attendance,
            opened,
            nrsc,
            pkt,
            category: 'Agent'
          };
        });
        
        localStorage.setItem('nyshipData', JSON.stringify(nyshipData));
        resolve({ success: true, count: Object.keys(nyshipData).length, smeCount });
      } catch (error) {
        reject(error);
      }
    };
    reader.onerror = () => reject(new Error('Error leyendo archivo'));
    reader.readAsArrayBuffer(file);
  });
}

function handleNYSHIPUpload(event) {
  const file = event.target.files[0];
  if (!file) return;
  
  const statusEl = document.getElementById('modalStatus');
  statusEl.className = 'modal-status loading visible';
  statusEl.innerHTML = '<div class="spinner"></div> Procesando NYSHIP...';
  
  loadNYSHIPData(file)
    .then(result => {
      statusEl.className = 'modal-status success visible';
      statusEl.innerHTML = `✅ NYSHIP cargado: ${result.count} agents (${result.smeCount} SME)`;
      setTimeout(() => location.reload(), 1500);
    })
    .catch(error => {
      statusEl.className = 'modal-status error visible';
      statusEl.innerHTML = `❌ Error: ${error.message}`;
    });
}

// Demo data fallback para NYSHIP si localStorage está vacío

// Inicializar demo data en localStorage

  localStorage.setItem('nyshipData', JSON.stringify(NYSHIP_DEMO));
}

</script>
